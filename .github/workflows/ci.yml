name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build (Next.js)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8787"
